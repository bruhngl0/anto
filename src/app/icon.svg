<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background badge matching the site's dark tone -->
  <rect width="512" height="512" rx="112" fill="#2b2b2b" />
  
  <!-- Centered White Ant Vector Illustration -->
  <g id="ant-favicon">
    <!-- Abdomen -->
    <ellipse cx="256" cy="398" rx="55" ry="65" fill="#f2f2f2" />
    
    <!-- Middle Body / Thorax segments -->
    <ellipse cx="256" cy="298" rx="42" ry="50" fill="#f2f2f2" />
    <ellipse cx="256" cy="208" rx="35" ry="45" fill="#f2f2f2" />
    
    <!-- Head -->
    <circle cx="256" cy="148" r="30" fill="#f2f2f2" />
    
    <!-- Antennae -->
    <line x1="256" y1="118" x2="206" y2="48" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
    <line x1="256" y1="118" x2="306" y2="48" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
    <circle cx="201" cy="43" r="8" fill="#f2f2f2" />
    <circle cx="311" cy="43" r="8" fill="#f2f2f2" />
    
    <!-- Legs (Top pair) -->
    <line x1="216" y1="288" x2="136" y2="248" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
    <line x1="296" y1="288" x2="376" y2="248" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
    
    <!-- Legs (Middle pair) -->
    <line x1="216" y1="328" x2="126" y2="328" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
    <line x1="296" y1="328" x2="386" y2="328" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
    
    <!-- Legs (Bottom pair) -->
    <line x1="216" y1="368" x2="146" y2="418" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
    <line x1="296" y1="368" x2="366" y2="418" stroke="#f2f2f2" stroke-width="7" stroke-linecap="round" />
  </g>
</svg>
